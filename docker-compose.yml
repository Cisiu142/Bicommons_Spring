version: '3.8'

services:
  biocommons-api:
    build: .
    container_name: biocommons-api
    restart: unless-stopped
    ports:
      - "8085:8080"
    environment:
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    networks:
      - biocommons_net

networks:
  biocommons_net:
    driver: bridge
