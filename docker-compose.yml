version: '3.8'

services:
  biocommons-api:
    build: .
    container_name: biocommons-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Twardy limit pamięci: startuje z 128MB, maksymalnie zżera 256MB
      - JAVA_TOOL_OPTIONS=-Xms128m -Xmx256m
    networks:
      - monitoring_network

networks:
  monitoring_network:
    external: true